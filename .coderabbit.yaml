# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
reviews:
  high_level_summary_in_walkthrough: true
  path_filters:
    - "!docs/images/**"
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.jpeg"
    - "!**/*.gif"
  pre_merge_checks:
    override_requested_reviewers_only: true
    description:
      mode: warning
    custom_checks:
      - name: "CLI and docs sync"
        mode: warning
        instructions: |
          Pass when user-visible CLI commands, flags, JSON fields, size limits, or reviewer workflow guidance stay in sync with README.md, AGENTS.md, or skills/SKILL.md. Fail when behavior changed for users or reviewers but the matching documentation was not updated.
  path_instructions:
    - path: "src/**/*.rs"
      instructions: |
        Prioritize correctness, security boundaries, panic paths, and performance regressions.
        Treat fail-open behavior around path validation, sandboxing, and size limits as high severity.
        Only report bugs when you can explain a concrete failure scenario or regression.
    - path: "tests/**/*.rs"
      instructions: |
        Check that changed behavior is covered by deterministic tests.
        Prefer boundary values, invalid input, and regression cases over broad snapshots.
    - path: "README.md"
      instructions: |
        Keep CLI examples executable as written and aligned with current command names and output behavior.
    - path: "AGENTS.md"
      instructions: |
        Treat this file as repository review policy and flag contradictions with implementation, README.md, or skills/SKILL.md.
    - path: "skills/SKILL.md"
      instructions: |
        Keep instructions short, action-oriented, and unambiguous.
        Make Grep-vs-refs decisions explicit and surface lower-adoption commands like session, sequence, cochange, and lint when relevant.
    - path: ".coderabbit.yaml"
      instructions: |
        Keep this file aligned with current CodeRabbit features and repo policy.
        Use path instructions only as a supplement to code guidelines, and start new pre-merge checks in warning mode.
