name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual release)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: astro-sight

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          # Use 2-digit year (YY) for Windows MSI compatibility (major version must be <= 255)
          YEAR=$(date +%y)
          MONTH=$(date +%-m)

          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Current version: ${CURRENT}"

          if echo "${CURRENT}" | grep -qE '^[0-9]{2,4}\.[0-9]{1,2}\.[0-9]+$'; then
            OLD_YEAR=$(echo "${CURRENT}" | cut -d. -f1)
            OLD_MONTH=$(echo "${CURRENT}" | cut -d. -f2)
            OLD_COUNTER=$(echo "${CURRENT}" | cut -d. -f3)
            # Handle both 2-digit and 4-digit year formats
            OLD_YEAR_2DIGIT=$(echo "${OLD_YEAR}" | sed 's/^20//')
            if [ "${OLD_YEAR_2DIGIT}" = "${YEAR}" ] && [ "${OLD_MONTH}" = "${MONTH}" ]; then
              NEW_COUNTER=$((OLD_COUNTER + 1))
            else
              NEW_COUNTER=100
            fi
          else
            NEW_COUNTER=100
          fi

          NEW_VERSION="${YEAR}.${MONTH}.${NEW_COUNTER}"
          echo "New version: ${NEW_VERSION}"

          # Only replace the first occurrence (package version, not dependency versions)
          sed -i "0,/^version = \"[^\"]*\"/s//version = \"${NEW_VERSION}\"/" Cargo.toml

          if [ -f "Cargo.lock" ]; then
            cargo generate-lockfile 2>/dev/null || true
          fi

          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          git add Cargo.toml
          [ -f "Cargo.lock" ] && git add Cargo.lock || true

          git commit -m "Release ${{ steps.bump.outputs.tag }}"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"
          git push origin ${{ github.ref_name }} "${{ steps.bump.outputs.tag }}"

      - name: Dry run info
        if: ${{ inputs.dry_run }}
        run: |
          echo "🧪 Dry run mode - skipping commit and tag"
          echo "Would release: ${{ steps.bump.outputs.tag }}"

  build:
    name: Build (${{ matrix.target }})
    needs: prepare-release
    if: ${{ !inputs.dry_run }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: astro-sight
            asset_name: astro-sight-x86_64-unknown-linux-gnu.tar.gz
            cross: false

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: astro-sight
            asset_name: astro-sight-aarch64-unknown-linux-gnu.tar.gz
            cross: true

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: astro-sight
            asset_name: astro-sight-x86_64-apple-darwin.tar.gz
            cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: astro-sight
            asset_name: astro-sight-aarch64-apple-darwin.tar.gz
            cross: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: astro-sight.exe
            asset_name: astro-sight-x86_64-pc-windows-msvc.zip
            cross: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build with cross
        if: matrix.cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross
          cross build --release --target ${{ matrix.target }}

      - name: Build
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: [prepare-release, build]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ needs.prepare-release.outputs.tag }}
          body: |
            ## astro-sight ${{ needs.prepare-release.outputs.version }}

            AI エージェント向け AST 情報生成 CLI (tree-sitter ベース、15言語対応)

            ### Installation

            #### Homebrew (macOS/Linux)
            ```bash
            brew install owayo/astro-sight/astro-sight
            ```

            #### Manual Download
            Download the appropriate binary for your platform and add it to your PATH.

            #### macOS (Apple Silicon)
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ needs.prepare-release.outputs.tag }}/astro-sight-aarch64-apple-darwin.tar.gz | tar xz
            sudo mv astro-sight /usr/local/bin/
            ```

            #### macOS (Intel)
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ needs.prepare-release.outputs.tag }}/astro-sight-x86_64-apple-darwin.tar.gz | tar xz
            sudo mv astro-sight /usr/local/bin/
            ```

            #### Linux (x86_64)
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ needs.prepare-release.outputs.tag }}/astro-sight-x86_64-unknown-linux-gnu.tar.gz | tar xz
            sudo mv astro-sight /usr/local/bin/
            ```

            #### Linux (ARM64)
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ needs.prepare-release.outputs.tag }}/astro-sight-aarch64-unknown-linux-gnu.tar.gz | tar xz
            sudo mv astro-sight /usr/local/bin/
            ```

            #### Windows
            Download `astro-sight-x86_64-pc-windows-msvc.zip`, extract, and add to PATH.

          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: [prepare-release, release]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.PRIVATE_KEY }}
          repositories: '["homebrew-astro-sight"]'

      - name: Download release binaries and create bottles
        id: bottles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          TAG="${{ needs.prepare-release.outputs.tag }}"
          REPO="${{ github.repository }}"

          # Download source archive SHA256
          curl -sL "https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz" -o source.tar.gz
          SHA256_SOURCE=$(sha256sum source.tar.gz | cut -d' ' -f1)
          echo "sha256_source=${SHA256_SOURCE}" >> $GITHUB_OUTPUT

          # Download release tarballs
          curl -sL "https://github.com/${REPO}/releases/download/${TAG}/astro-sight-aarch64-apple-darwin.tar.gz" -o mac_arm64.tar.gz
          curl -sL "https://github.com/${REPO}/releases/download/${TAG}/astro-sight-x86_64-apple-darwin.tar.gz" -o mac_x86_64.tar.gz
          curl -sL "https://github.com/${REPO}/releases/download/${TAG}/astro-sight-x86_64-unknown-linux-gnu.tar.gz" -o linux_x86_64.tar.gz

          # Function to create a Homebrew bottle tarball
          create_bottle() {
            local src_tarball=$1
            local bottle_tag=$2
            rm -rf bottle_staging
            mkdir -p "bottle_staging/astro-sight/${VERSION}/bin"
            tar xzf "${src_tarball}" -C "bottle_staging/astro-sight/${VERSION}/bin/"
            chmod +x "bottle_staging/astro-sight/${VERSION}/bin/astro-sight"
            local bottle_name="astro-sight-${VERSION}.${bottle_tag}.bottle.tar.gz"
            tar czf "${bottle_name}" -C bottle_staging astro-sight
            sha256sum "${bottle_name}" | cut -d' ' -f1
          }

          # Create bottles for each platform
          SHA256_ARM64=$(create_bottle mac_arm64.tar.gz arm64_sonoma)
          SHA256_INTEL=$(create_bottle mac_x86_64.tar.gz sonoma)
          SHA256_LINUX=$(create_bottle linux_x86_64.tar.gz x86_64_linux)

          echo "sha256_arm64=${SHA256_ARM64}" >> $GITHUB_OUTPUT
          echo "sha256_intel=${SHA256_INTEL}" >> $GITHUB_OUTPUT
          echo "sha256_linux=${SHA256_LINUX}" >> $GITHUB_OUTPUT

      - name: Upload bottles to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare-release.outputs.tag }}"
          gh release upload "${TAG}" *.bottle.tar.gz --clobber --repo "${{ github.repository }}"

      - name: Update Homebrew Formula
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          TAG="${{ needs.prepare-release.outputs.tag }}"
          SHA256_SOURCE="${{ steps.bottles.outputs.sha256_source }}"
          SHA256_ARM64="${{ steps.bottles.outputs.sha256_arm64 }}"
          SHA256_INTEL="${{ steps.bottles.outputs.sha256_intel }}"
          SHA256_LINUX="${{ steps.bottles.outputs.sha256_linux }}"

          # Clone homebrew tap
          git clone "https://x-access-token:${GH_TOKEN}@github.com/owayo/homebrew-astro-sight.git"
          cd homebrew-astro-sight

          # Create Formula directory if not exists
          mkdir -p Formula

          # Create/update formula
          cat > Formula/astro-sight.rb << 'FORMULA'
          class AstroSight < Formula
            desc "AST information generator CLI for AI agents"
            homepage "https://github.com/owayo/astro-sight"
            url "https://github.com/owayo/astro-sight/archive/refs/tags/vVERSION_PLACEHOLDER.tar.gz"
            sha256 "SOURCE_SHA256_PLACEHOLDER"
            license "MIT"

            bottle do
              root_url "https://github.com/owayo/astro-sight/releases/download/vVERSION_PLACEHOLDER"
              sha256 cellar: :any_skip_relocation, arm64_sonoma: "ARM64_SHA256_PLACEHOLDER"
              sha256 cellar: :any_skip_relocation, sonoma: "INTEL_SHA256_PLACEHOLDER"
              sha256 cellar: :any_skip_relocation, x86_64_linux: "LINUX_SHA256_PLACEHOLDER"
            end

            depends_on "rust" => :build

            def install
              system "cargo", "install", *std_cargo_args
            end

            test do
              system "#{bin}/astro-sight", "--version"
            end
          end
          FORMULA

          # Replace placeholders with actual values
          sed -i "s|VERSION_PLACEHOLDER|${VERSION}|g" Formula/astro-sight.rb
          sed -i "s|SOURCE_SHA256_PLACEHOLDER|${SHA256_SOURCE}|g" Formula/astro-sight.rb
          sed -i "s|ARM64_SHA256_PLACEHOLDER|${SHA256_ARM64}|g" Formula/astro-sight.rb
          sed -i "s|INTEL_SHA256_PLACEHOLDER|${SHA256_INTEL}|g" Formula/astro-sight.rb
          sed -i "s|LINUX_SHA256_PLACEHOLDER|${SHA256_LINUX}|g" Formula/astro-sight.rb

          # Remove leading spaces from heredoc
          sed -i 's/^          //' Formula/astro-sight.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/astro-sight.rb
          git commit -m "Update astro-sight to ${TAG}"
          git push

  release-summary:
    name: Release Summary
    needs: [prepare-release, release, update-homebrew]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "🚀 Released ${{ needs.prepare-release.outputs.tag }}"
          echo ""
          echo "Assets uploaded:"
          echo "  - astro-sight-x86_64-unknown-linux-gnu.tar.gz"
          echo "  - astro-sight-aarch64-unknown-linux-gnu.tar.gz"
          echo "  - astro-sight-x86_64-apple-darwin.tar.gz"
          echo "  - astro-sight-aarch64-apple-darwin.tar.gz"
          echo "  - astro-sight-x86_64-pc-windows-msvc.zip"
          echo ""
          echo "🍺 Homebrew tap updated: owayo/homebrew-astro-sight"
